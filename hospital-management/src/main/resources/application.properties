# ============================================================
# Hospital Management System - Application Configuration
# ============================================================

# ---- Server Configuration ----
server.port=8080

# ---- MySQL Database Configuration ----
# Replace 'root' and 'yourpassword' with your actual MySQL credentials
# Replace 'hospital_db' with your preferred database name (create it in MySQL first)
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=yourpassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate Configuration ----
# 'update' will auto-create/update tables based on entity classes
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in the console (useful for debugging)
spring.jpa.show-sql=true

# Format SQL for easier reading
spring.jpa.properties.hibernate.format_sql=true

# MySQL dialect for Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ---- Jackson JSON Configuration ----
# Prevent serialization errors with JPA lazy-loaded objects
spring.jackson.serialization.fail-on-empty-beans=false
